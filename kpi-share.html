<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI Harian MKI Makassar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1209;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px;}
#status{color:#fff;font-size:15px;text-align:center;opacity:.8;}
#spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,.2);border-top-color:#c17a5a;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
canvas{display:none;border-radius:12px;max-width:100%;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.btn-group{display:none;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:360px;}
#btnWA{background:#25D366;color:#fff;border:none;border-radius:12px;padding:16px 0;font-size:18px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 16px rgba(37,211,102,.4);}
#btnWA svg{width:22px;height:22px;flex-shrink:0;}
#btnSave{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:10px;padding:12px 0;font-size:14px;cursor:pointer;width:100%;}
#note{color:rgba(255,255,255,.45);font-size:12px;text-align:center;max-width:320px;line-height:1.6;display:none;}
#errMsg{display:none;color:#ff6b6b;font-size:14px;text-align:center;max-width:320px;}
</style>
</head>
<body>
<div id="spinner"></div>
<div id="status">Mengambil data terkini…</div>
<canvas id="kpiCanvas" width="1080" height="1080"></canvas>
<div class="btn-group" id="btnGroup">
  <button id="btnWA">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.374 0 0 5.373 0 12c0 2.117.554 4.103 1.523 5.83L.057 23.997l6.334-1.648A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-4.976-1.352l-.357-.211-3.68.957.984-3.57-.232-.368A9.818 9.818 0 012.182 12C2.182 6.566 6.566 2.182 12 2.182S21.818 6.566 21.818 12 17.434 21.818 12 21.818z"/></svg>
    Kirim ke WhatsApp
  </button>
  <button id="btnSave">⬇ Simpan ke Galeri</button>
</div>
<div id="note"></div>
<div id="errMsg"></div>

<script>
const SHEET_ID='1_uou6JDGV-Tm80oALMrduuj9ZIVWM1r9ppuQsYq7_qo';
const fmtRp=v=>{if(!v||v===0)return'Rp0';if(v>=1e9)return'Rp'+(v/1e9).toFixed(2).replace('.',',')+' M';if(v>=1e6)return'Rp'+Math.round(v/1e6)+' Jt';return'Rp'+v.toLocaleString('id-ID');};
const fmtPct=v=>(v||0).toFixed(1)+'%';
const fmtNum=v=>(v||0).toLocaleString('id-ID');
const toNum=v=>parseFloat(String(v||'').replace(/[^0-9.-]/g,''))||0;
const toIso=d=>d?[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-'):'';
function parseDate(s){if(!s)return null;const mo={jan:0,feb:1,mar:2,apr:3,mei:4,may:4,jun:5,jul:6,agu:7,aug:7,sep:8,okt:9,oct:9,nov:10,des:11,dec:11};const m1=s.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);if(m1){const m=mo[m1[2].toLowerCase().substring(0,3)];if(m!==undefined)return new Date(+m1[3],m,+m1[1]);}const m2=s.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);if(m2)return new Date(+m2[3],+m2[2]-1,+m2[1]);const m3=s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);if(m3)return new Date(+m3[1],+m3[2]-1,+m3[3]);return null;}
function parseCSV(txt){const rows=[];let row=[],field='',inQ=false;for(let i=0;i<txt.length;i++){const c=txt[i];if(inQ){if(c==='"'&&txt[i+1]==='"'){field+='"';i++;}else if(c==='"')inQ=false;else field+=c;}else if(c==='"')inQ=true;else if(c===','){row.push(field.trim());field='';}else if(c==='\n'||c==='\r'){if(field||row.length){row.push(field.trim());rows.push(row);}row=[];field='';if(c==='\r'&&txt[i+1]==='\n')i++;}else field+=c;}if(field||row.length){row.push(field.trim());rows.push(row);}return rows;}
const uniq=(arr,fn)=>new Set(arr.map(fn)).size;

async function loadData(){
  const f=gid=>fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}&_=${Date.now()}`).then(r=>r.ok?r.text():Promise.reject('err '+gid));
  document.getElementById('status').textContent='Mengambil data Grand Data…';
  const [gTxt,rTxt,sTxt]=await Promise.all([f('1703817529'),f('1062237088'),f('1234708655')]);
  const gRows=parseCSV(gTxt),rRows=parseCSV(rTxt),sRows=parseCSV(sTxt);
  const h=gRows[0];
  const iDate=h.findIndex(x=>x==='Order Date'),iInv=h.findIndex(x=>x.includes('Invoice')),iAmt=h.findIndex(x=>x==='Amount'),iStage=h.findIndex(x=>x==='Stage'),iEksp=h.findIndex(x=>x.includes('Ekspedisi')),iStat=h.findIndex(x=>x==='Status'),iComp=h.findIndex(x=>x==='Company');
  const TODAY=new Date(),todayStr=toIso(TODAY),mIdx=TODAY.getMonth();
  const tx=gRows.slice(1).map(r=>({date:parseDate(r[iDate]),noInv:r[iInv],amount:toNum(r[iAmt]),stage:(r[iStage]||'').toLowerCase(),eksp:(r[iEksp]||'').toUpperCase(),status:r[iStat]||'',co:r[iComp]||''})).filter(t=>t.date);
  const txM=tx.filter(t=>t.date.getMonth()===mIdx&&t.stage!=='return'),txD=txM.filter(t=>toIso(t.date)===todayStr);
  const salesM=txM.reduce((s,t)=>s+t.amount,0),salesD=txD.reduce((s,t)=>s+t.amount,0);
  const salesMKI=txM.filter(t=>t.co==='MKI').reduce((s,t)=>s+t.amount,0),salesCFN=txM.filter(t=>t.co==='CFN').reduce((s,t)=>s+t.amount,0);
  const invM=uniq(txM,t=>t.noInv),invD=uniq(txD,t=>t.noInv),invMKI=uniq(txM.filter(t=>t.co==='MKI'),t=>t.noInv),invCFN=uniq(txM.filter(t=>t.co==='CFN'),t=>t.noInv);
  const txNoHC=txM.filter(t=>t.eksp!=='HAND CARRY'),invTot=uniq(txNoHC,t=>t.noInv);
  const invOTD=uniq(txNoHC.filter(t=>t.stage==='complete'&&t.status==='Same Day'),t=>t.noInv);
  const otdPct=invTot>0?(invOTD/invTot)*100:0;
  const txDNoHC=txD.filter(t=>t.eksp!=='HAND CARRY'),invDTot=uniq(txDNoHC,t=>t.noInv);
  const invDOTD=uniq(txDNoHC.filter(t=>t.stage==='complete'&&t.status==='Same Day'),t=>t.noInv);
  const otdDay=invDTot>0?(invDOTD/invDTot)*100:null;
  const totalQty=txNoHC.reduce((s,t)=>s+toNum(t.qty||0),0),totalKoli=txNoHC.reduce((s,t)=>s+toNum(t.koli||0),0);
  const rh=rRows[0];
  const iRD=rh.findIndex(x=>x.includes('Date')),iRP=rh.findIndex(x=>x.toLowerCase().includes('pelunasan')),iRC=rh.findIndex(x=>x.toLowerCase().includes('company'));
  const rv=rRows.slice(1).map(r=>({date:parseDate(r[iRD]),pel:toNum(r[iRP]),co:r[iRC]||''})).filter(r=>r.date);
  const revM=rv.filter(r=>r.date.getMonth()===mIdx).reduce((s,r)=>s+r.pel,0),revD=rv.filter(r=>toIso(r.date)===todayStr).reduce((s,r)=>s+r.pel,0);
  const revMKI=rv.filter(r=>r.date.getMonth()===mIdx&&r.co==='MKI').reduce((s,r)=>s+r.pel,0),revCFN=rv.filter(r=>r.date.getMonth()===mIdx&&r.co==='CFN').reduce((s,r)=>s+r.pel,0);
  const MN=['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];
  let targetSales=0;
  for(const row of sRows.slice(1)){if((row[0]||'').toUpperCase().includes(MN[mIdx].substring(0,3))){targetSales=toNum(row[45]);break;}}
  const pctSales=targetSales>0?(salesM/targetSales)*100:0,pctRev=targetSales>0?(revM/targetSales)*100:0,collection=salesM>0?(revM/salesM)*100:0;
  return {TODAY,todayStr,mIdx,salesM,salesD,salesMKI,salesCFN,targetSales,pctSales,invM,invD,invMKI,invCFN,revM,revD,revMKI,revCFN,pctRev,otdPct,otdDay,invOTD,invTot,totalQty,totalKoli,collection};
}

function drawCanvas(d){
  const cv=document.getElementById('kpiCanvas'),ctx=cv.getContext('2d'),W=1080,H=1080;
  // BG
  ctx.fillStyle='#f8f5f0';ctx.fillRect(0,0,W,H);
  // Header
  const hg=ctx.createLinearGradient(0,0,W,0);hg.addColorStop(0,'#c17a5a');hg.addColorStop(1,'#a85d3f');
  ctx.fillStyle=hg;ctx.fillRect(0,0,W,106);
  ctx.fillStyle='rgba(255,255,255,.65)';ctx.font='600 20px system-ui,sans-serif';ctx.fillText('MKI — CABANG MAKASSAR',44,34);
  ctx.fillStyle='#fff';ctx.font='bold 30px system-ui,sans-serif';ctx.fillText('Dashboard Kinerja Bisnis MKI Makassar 2026',44,74);
  const DAYS=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'],MONTHS=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  ctx.fillStyle='rgba(255,255,255,.75)';ctx.font='400 19px system-ui,sans-serif';ctx.textAlign='right';
  ctx.fillText(`${DAYS[d.TODAY.getDay()]}, ${d.TODAY.getDate()} ${MONTHS[d.mIdx]} ${d.TODAY.getFullYear()}`,W-44,62);ctx.textAlign='left';

  function bar(x,y,w,pct){
    ctx.fillStyle='#e8e0d4';ctx.beginPath();ctx.roundRect(x,y,w,7,3.5);ctx.fill();
    const fc=Math.min(pct/100,1)*w,bc=pct>=100?'#4d8a5c':pct>=60?'#d4a843':'#c17a5a';
    if(fc>0){ctx.fillStyle=bc;ctx.beginPath();ctx.roundRect(x,y,fc,7,3.5);ctx.fill();}
  }
  function badge(x,y,pct){
    const st=pct>=100?'✓ TARGET HIT':pct>=60?'▲ ON PROGRESS':'⚠ BELUM ACHIEVE';
    const bc=pct>=100?'#dceede':pct>=60?'#fef3cd':'#f3dad6',tc=pct>=100?'#4d6b46':pct>=60?'#856404':'#8c3c30';
    ctx.font='bold 13px system-ui,sans-serif';const bw=ctx.measureText(st).width+20;
    ctx.fillStyle=bc;ctx.beginPath();ctx.roundRect(x,y,bw,24,5);ctx.fill();
    ctx.fillStyle=tc;ctx.fillText(st,x+10,y+16);
  }

  function card(x,y,w,h2,o){
    ctx.save();ctx.fillStyle='#fff';ctx.strokeStyle='#ddd6cc';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(x,y,w,h2,12);ctx.fill();ctx.stroke();ctx.restore();
    // Label
    ctx.fillStyle='#9a7a5a';ctx.font='bold 15px system-ui,sans-serif';ctx.fillText(o.label,x+24,y+34);
    // Value
    ctx.fillStyle=o.vc||'#2a2520';ctx.font=`bold ${o.fs||46}px system-ui,sans-serif`;ctx.fillText(o.val,x+24,y+90);
    // Sub harian
    if(o.sub1){ctx.fillStyle='#6a5a4a';ctx.font='400 16px system-ui,sans-serif';ctx.fillText(o.sub1,x+24,y+116);}
    // MKI/CFN
    if(o.mki!==undefined){
      ctx.fillStyle='#c17a5a';ctx.font='bold 15px system-ui,sans-serif';ctx.fillText('MKI '+o.mki,x+24,y+140);
      ctx.fillStyle='#7a9872';ctx.fillText('CFN '+o.cfn,x+24+200,y+140);
    }
    // Extra sub
    if(o.sub2){ctx.fillStyle='#6a5a4a';ctx.font='400 14px system-ui,sans-serif';ctx.fillText(o.sub2,x+24,y+(o.sy||145));}
    // Progress bar + badge
    if(o.pct!==undefined){
      const by=y+(o.by||152);
      bar(x+24,by,w-48,o.pct);
      badge(x+24,by+12,o.pct);
    }
  }

  const CW=488,CH=230,GAP=24,L=40,T=120;
  card(L,T,CW,CH,{label:'TOTAL SALES — '+MONTHS[d.mIdx].toUpperCase(),val:fmtRp(d.salesM),sub1:'Hari ini: '+fmtRp(d.salesD),mki:fmtRp(d.salesMKI),cfn:fmtRp(d.salesCFN),pct:d.pctSales,by:150});
  card(L+CW+GAP,T,CW,CH,{label:'TOTAL REVENUE — '+MONTHS[d.mIdx].toUpperCase(),val:fmtRp(d.revM),sub1:'Hari ini: '+fmtRp(d.revD),mki:fmtRp(d.revMKI),cfn:fmtRp(d.revCFN),pct:d.pctRev,by:150});
  const T2=T+CH+GAP;
  card(L,T2,CW,CH,{label:'TOTAL INVOICE — '+MONTHS[d.mIdx].toUpperCase(),val:fmtNum(d.invM),fs:54,sub1:'Hari ini: '+fmtNum(d.invD)+' invoice',mki:fmtNum(d.invMKI),cfn:fmtNum(d.invCFN),pct:d.invM>0?(d.invM/280)*100:0,by:150});
  card(L+CW+GAP,T2,CW,CH,{label:'OTD ACCURACY — '+MONTHS[d.mIdx].toUpperCase(),val:fmtPct(d.otdPct),fs:54,vc:d.otdPct>=80?'#4d8a5c':d.otdPct>=60?'#d4a843':'#c17a5a',sub1:'Hari ini: '+(d.otdDay!==null?fmtPct(d.otdDay):'—')+' ('+fmtNum(Math.round(d.invOTD||0))+'/'+fmtNum(Math.round(d.invTot||0))+' inv)',sub2:'Total Qty: '+fmtNum(d.totalQty)+' | Total Koli: '+fmtNum(d.totalKoli),sy:138,pct:d.otdPct,by:150});
  const T3=T2+CH+GAP;
  card(L,T3,CW,CH-20,{label:'SALES TO REVENUE RATIO',val:fmtPct(d.collection),fs:50,sub1:'Sales: '+fmtRp(d.salesM)+'   Revenue: '+fmtRp(d.revM)});
  if(d.targetSales>0) card(L+CW+GAP,T3,CW,CH-20,{label:'TARGET SALES BULANAN',val:fmtRp(d.targetSales),fs:38,sub1:'Capaian: '+fmtPct(d.pctSales)+' dari target',pct:d.pctSales,by:130});

  // Footer
  ctx.fillStyle='#efe8df';ctx.fillRect(0,H-60,W,60);
  ctx.fillStyle='#a08060';ctx.font='400 15px system-ui,sans-serif';
  ctx.fillText('mkimakassar84-dev.github.io/Kinerja-Cabang-Makassar  •  '+new Date().toLocaleString('id-ID'),44,H-22);
}

function getCaption(d){
  const DAYS=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const MONTHS=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const tgl=`${DAYS[d.TODAY.getDay()]}, ${d.TODAY.getDate()} ${MONTHS[d.mIdx]} ${d.TODAY.getFullYear()}`;
  const pctSales=d.pctSales.toFixed(1),pctRev=d.pctRev.toFixed(1),otd=d.otdPct.toFixed(1);
  const stSales=d.pctSales>=100?'✅ TARGET HIT':d.pctSales>=60?'🔄 ON PROGRESS':'❗ BELUM ACHIEVE';
  const stOTD=d.otdPct>=80?'✅ TARGET HIT':d.otdPct>=60?'🔄 ON PROGRESS':'❗ BELUM ACHIEVE';
  return `📊 *Report ${tgl}*\n\n` +
    `💰 *Sales:* ${fmtRp(d.salesM)} (${pctSales}%) ${stSales}\n` +
    `📈 *Revenue:* ${fmtRp(d.revM)} (${pctRev}%)\n` +
    `🧾 *Invoice:* ${fmtNum(d.invM)} / 280\n` +
    `🚚 *OTD:* ${otd}% ${stOTD}\n\n` +
    `🔗 https://mkimakassar84-dev.github.io/Kinerja-Cabang-Makassar/`;
}

async function main(){
  try{
    const data=await loadData();
    document.getElementById('status').textContent='Membuat gambar KPI…';
    drawCanvas(data);
    document.getElementById('spinner').style.display='none';
    document.getElementById('status').style.display='none';
    const cv=document.getElementById('kpiCanvas');cv.style.display='block';
    document.getElementById('btnGroup').style.display='flex';
    const note=document.getElementById('note');
    const caption=getCaption(data);
    const filename=`Report-MKI-${data.todayStr}.png`;

    const getBlob=()=>new Promise(res=>cv.toBlob(res,'image/png'));

    // Tombol Kirim ke WhatsApp
    document.getElementById('btnWA').addEventListener('click',async()=>{
      // Coba Web Share API (native share sheet — pilih WA langsung)
      if(navigator.share&&navigator.canShare){
        const blob=await getBlob();
        const file=new File([blob],filename,{type:'image/png'});
        if(navigator.canShare({files:[file]})){
          try{
            await navigator.share({files:[file],title:'Report '+data.todayStr,text:caption});
            return;
          }catch(e){if(e.name==='AbortError')return;}
        }
      }
      // Fallback: download gambar lalu buka WA web dengan caption
      const a=document.createElement('a');a.download=filename;a.href=cv.toDataURL('image/png');a.click();
      setTimeout(()=>{
        window.open('https://wa.me/?text='+encodeURIComponent(caption),'_blank');
      },800);
      note.textContent='Gambar disimpan. Kirim gambar dari galeri HP ke grup WhatsApp, caption sudah otomatis tersedia di WA.';
      note.style.display='block';
    });

    // Tombol Simpan ke Galeri
    document.getElementById('btnSave').addEventListener('click',()=>{
      const a=document.createElement('a');a.download=filename;a.href=cv.toDataURL('image/png');a.click();
    });

  }catch(err){
    document.getElementById('spinner').style.display='none';
    document.getElementById('status').style.display='none';
    const e=document.getElementById('errMsg');e.style.display='block';
    e.textContent='Gagal memuat data: '+err.message+'. Pastikan koneksi aktif dan refresh.';
    console.error(err);
  }
}
main();
</script>
</body>
</html>
