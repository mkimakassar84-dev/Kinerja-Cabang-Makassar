<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan Lengkap PO Gudang — MKI Cabang Makassar</title>
<style>
:root{
  --paper:#fdfbf7; --cream:#f5efe4; --ink:#3a3530; --ink-soft:#6a5f52;
  --line:#e5ddcf; --terra:#c17a5a; --terra-dim:#f3e6de; --amber:#a85d1d;
  --shadow:0 2px 10px rgba(58,53,48,.06);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'Segoe UI', system-ui, sans-serif; background:var(--cream); color:var(--ink);
  padding:20px 16px 60px; line-height:1.5;
}
.wrap{max-width:900px; margin:0 auto;}
header{
  background:linear-gradient(135deg,#c17a5a,#a85d3f); color:#fff; border-radius:14px;
  padding:22px 24px; margin-bottom:20px; box-shadow:var(--shadow);
}
header .eyebrow{font-size:12px; letter-spacing:.08em; text-transform:uppercase; opacity:.7; margin-bottom:6px;}
header h1{font-size:22px; font-weight:700; margin-bottom:8px;}
header .meta{font-size:13px; opacity:.85;}
.summary-bar{display:flex; flex-wrap:wrap; gap:12px; margin-bottom:20px;}
.summary-card{
  flex:1; min-width:140px; background:var(--paper); border:1px solid var(--line); border-radius:12px;
  padding:14px 16px; box-shadow:var(--shadow);
}
.summary-card .label{font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.04em; margin-bottom:4px;}
.summary-card .value{font-size:19px; font-weight:700;}
.search-box{margin-bottom:18px;}
.search-box input{
  width:100%; padding:11px 14px; border:1px solid var(--line); border-radius:10px; font-size:14px;
  background:var(--paper); color:var(--ink);
}
.search-box input:focus{outline:none; border-color:var(--terra);}
.table-section{
  background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:18px 20px 8px;
  margin-bottom:18px; box-shadow:var(--shadow); overflow-x:auto;
}
.table-section .sub{font-size:12px; color:var(--ink-soft); margin-bottom:12px;}
table{width:100%; border-collapse:collapse; font-size:13px; min-width:640px;}
th{
  text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--ink-soft);
  padding:8px 8px; border-bottom:2px solid var(--line); white-space:nowrap;
}
th.num, td.num{text-align:right;}
td{padding:9px 8px; border-bottom:1px solid var(--line); white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--cream);}
.badge-menunggu{color:var(--amber); font-weight:700;}
.empty{padding:24px 8px; text-align:center; color:var(--ink-soft); font-style:italic; font-size:13px;}
footer{text-align:center; font-size:11.5px; color:var(--ink-soft); margin-top:24px;}
#status{text-align:center; padding:60px 20px; color:var(--ink-soft);}
.spinner{
  width:36px; height:36px; border:3px solid var(--line); border-top-color:var(--terra); border-radius:50%;
  animation:spin .8s linear infinite; margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg);}}
#content{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <div id="status">
    <div class="spinner"></div>
    <div>Mengambil data PO Gudang terkini&hellip;</div>
  </div>
  <div id="content">
    <header>
      <div class="eyebrow">MKI &mdash; Cabang Makassar</div>
      <h1 id="pageTitle">Laporan Lengkap PO Gudang &mdash; Barang Ditunggu</h1>
      <div class="meta" id="pageMeta"></div>
    </header>
    <div class="summary-bar" id="summaryBar"></div>
    <div class="search-box">
      <input type="text" id="liveSearch" placeholder="Cari NO PO atau kode barang&hellip;" />
    </div>
    <div class="table-section">
      <div class="sub" id="tableSub"></div>
      <div id="tableWrap"></div>
    </div>
    <footer>mkimakassar84-dev.github.io/Kinerja-Cabang-Makassar &bull; Data langsung dari Google Sheets</footer>
  </div>
</div>
<script>
const SID='1_uou6JDGV-Tm80oALMrduuj9ZIVWM1r9ppuQsYq7_qo';
const Num=v=>(v||0).toLocaleString('id-ID');
const N=v=>parseFloat(String(v||'').replace(/[^0-9.-]/g,''))||0;
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function pDate(s){if(!s)return null;const mo={jan:0,feb:1,mar:2,apr:3,mei:4,may:4,jun:5,jul:6,agu:7,aug:7,sep:8,okt:9,oct:9,nov:10,des:11,dec:11};let m=s.match(/(\d{1,2})[-\s]+([A-Za-z]+)[-\s]+(\d{4})/);if(m){const k=mo[m[2].toLowerCase().slice(0,3)];if(k!==undefined)return new Date(+m[3],k,+m[1]);}m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return new Date(+m[3],+m[2]-1,+m[1]);m=s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);return null;}
function csv(t){const rows=[];let row=[],f='',q=false;for(let i=0;i<t.length;i++){const c=t[i];if(q){if(c==='"'&&t[i+1]==='"'){f+='"';i++;}else if(c==='"')q=false;else f+=c;}else if(c==='"')q=true;else if(c===','){row.push(f.trim());f='';}else if(c==='\n'||c==='\r'){if(f||row.length){row.push(f.trim());rows.push(row);}row=[];f='';if(c==='\r'&&t[i+1]==='\n')i++;}else f+=c;}if(f||row.length){row.push(f.trim());rows.push(row);}return rows;}

const params=new URLSearchParams(window.location.search);
const filterMonth=params.get('month');
const filterQ=(params.get('q')||'').toUpperCase();

let allItems=[];
const MO=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

async function load(){
  const r=await fetch('https://docs.google.com/spreadsheets/d/'+SID+'/export?format=csv&gid=2047354384&_='+Date.now());
  if(!r.ok) throw new Error('Gagal mengambil data sheet');
  const rows=csv(await r.text());
  let items=rows.slice(1).map(row=>{
    const orderDate=pDate(row[1]);
    const noPO=row[2]||'';
    const company=(row[3]||'').toUpperCase();
    const kodeBarang=(row[4]||'').toUpperCase();
    const qty=N(row[5]);
    const noSuratJalan=row[6]||'';
    const statusEkspedisi=row[7]||'';
    const stage=row[8]||'';
    let statusBarang;
    const stg=stage.toLowerCase();
    if(stg==='complete') statusBarang='diterima';
    else if(stg==='return') statusBarang='retur';
    else if(!stage&&!noSuratJalan&&!statusEkspedisi) statusBarang='ditunggu';
    else statusBarang='lainnya';
    return {orderDate,noPO,company,kodeBarang,qty,noSuratJalan,statusEkspedisi,stage,statusBarang};
  }).filter(p=>p.orderDate);

  items=items.filter(p=>p.stage.toLowerCase()!=='return'&&p.statusBarang!=='diterima');
  if(filterMonth!==null){
    const mi=parseInt(filterMonth,10);
    items=items.filter(p=>p.orderDate.getMonth()===mi);
  }
  if(filterQ){
    items=items.filter(p=>p.noPO.toUpperCase().includes(filterQ)||p.kodeBarang.includes(filterQ));
  }
  items.sort((a,b)=>(a.orderDate?.getTime()||0)-(b.orderDate?.getTime()||0));
  allItems=items;
}

function render(){
  const q=(document.getElementById('liveSearch').value||'').toUpperCase();
  const items=q ? allItems.filter(p=>p.noPO.toUpperCase().includes(q)||p.kodeBarang.includes(q)) : allItems;

  const mki=items.filter(p=>p.company==='MKI').length;
  const cfn=items.filter(p=>p.company==='CFN').length;

  document.getElementById('pageMeta').textContent = new Date().toLocaleString('id-ID', {dateStyle:'full', timeStyle:'short'})
    + (filterMonth!==null ? ' \u2014 Bulan: '+MO[parseInt(filterMonth,10)] : '');

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-card"><div class="label">Total PO Ditunggu</div><div class="value">${Num(items.length)}</div></div>
    <div class="summary-card"><div class="label">MKI</div><div class="value">${Num(mki)}</div></div>
    <div class="summary-card"><div class="label">CFN</div><div class="value">${Num(cfn)}</div></div>
  `;

  document.getElementById('tableSub').textContent = Num(items.length) + ' PO masih ditunggu / dalam proses';

  document.getElementById('tableWrap').innerHTML = items.length ? `
    <table>
      <thead><tr>
        <th>Order Date</th><th>No PO</th><th>Company</th><th>Kode Barang</th>
        <th class="num">Qty</th><th>No Surat Jalan</th><th>Status Ekspedisi</th>
      </tr></thead>
      <tbody>${items.map(p=>`
        <tr>
          <td>${p.orderDate.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})}</td>
          <td>${esc(p.noPO)}</td>
          <td>${esc(p.company)}</td>
          <td>${esc(p.kodeBarang)}</td>
          <td class="num">${Num(p.qty)}</td>
          <td>${p.noSuratJalan ? esc(p.noSuratJalan) : '<span class="badge-menunggu">BARANG DITUNGGU</span>'}</td>
          <td>${p.statusEkspedisi ? esc(p.statusEkspedisi) : '&ndash;'}</td>
        </tr>
      `).join('')}</tbody>
    </table>
  ` : '<div class="empty">Tidak ada PO yang cocok.</div>';
}

async function main(){
  try{
    await load();
    document.getElementById('status').style.display='none';
    document.getElementById('content').style.display='block';
    render();
    document.getElementById('liveSearch').addEventListener('input', render);
  }catch(err){
    document.getElementById('status').innerHTML = '<div style="color:#c0392b;">Gagal memuat data: '+esc(err.message)+'</div>';
    console.error(err);
  }
}
main();
</script>
</body>
</html>
