<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitleTag">Laporan MKI Cabang Makassar</title>
<style>
:root{
  --cream:#f6f1e8; --paper:#ffffff; --ink:#2a2520; --ink-soft:#8a7a68;
  --line:#e3dccb; --terra:#c17a5a; --terra-dim:#f1ddd2; --shadow:0 1px 3px rgba(60,40,20,.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--cream);color:var(--ink);padding:24px 16px 60px;}
.wrap{max-width:900px;margin:0 auto;}
header{background:linear-gradient(135deg,#c17a5a,#a85d3f);color:#fff;border-radius:14px;padding:22px 24px;margin-bottom:20px;box-shadow:var(--shadow);}
header .eyebrow{font-size:12px;letter-spacing:.08em;text-transform:uppercase;opacity:.7;margin-bottom:6px;}
header h1{font-size:21px;font-weight:700;margin-bottom:8px;}
header .meta{font-size:13px;opacity:.85;}
.summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.summary-card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);min-width:0;}
.summary-card .label{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.summary-card .value{font-size:18px;font-weight:700;word-break:break-word;white-space:nowrap;overflow:hidden;}
.data-table-row-clickable{cursor:pointer;}
.data-table-row-clickable:hover td{background:var(--terra-dim);}
#drillPanel{display:none;margin-top:20px;}
#drillPanel h2{font-size:15px;font-weight:700;margin-bottom:2px;}
#drillPanel .sub{font-size:12px;color:var(--ink-soft);margin-bottom:12px;}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px 20px 8px;box-shadow:var(--shadow);}
.panel h2{font-size:15px;font-weight:700;margin-bottom:2px;}
.panel .sub{font-size:12px;color:var(--ink-soft);margin-bottom:12px;}
.search-box{margin-bottom:16px;}
.search-box input{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:var(--paper);color:var(--ink);}
.search-box input:focus{outline:none;border-color:var(--terra);}
.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.filter-row label{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;}
.filter-row select{padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--paper);color:var(--ink);}
.filter-row select:focus{outline:none;border-color:var(--terra);}
.table-scroll{overflow-x:auto;margin:0 -20px;padding:0 20px 4px;}
table{width:100%;min-width:340px;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);padding:8px;border-bottom:2px solid var(--line);white-space:nowrap;}
td{padding:9px 8px;border-bottom:1px solid var(--line);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--cream);}
.pagination{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center;padding:14px 0 4px;}
.page-btn{min-width:32px;height:32px;padding:0 8px;border:1px solid var(--line);border-radius:8px;background:var(--paper);color:var(--ink);font-size:13px;cursor:pointer;}
.page-btn:hover:not(:disabled){border-color:var(--terra);color:var(--terra);}
.page-btn.active{background:var(--terra);border-color:var(--terra);color:#fff;font-weight:700;}
.page-btn:disabled{opacity:.35;cursor:not-allowed;}
.page-ellipsis{color:var(--ink-soft);padding:0 2px;}
footer{text-align:center;font-size:11.5px;color:var(--ink-soft);margin-top:24px;}
#status{text-align:center;padding:60px 20px;color:var(--ink-soft);}
.spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--terra);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
#content{display:none;}
.empty{padding:24px 8px;text-align:center;color:var(--ink-soft);font-style:italic;font-size:13px;}
.hidden{display:none!important;}
</style>
</head>
<body>

  <div id="status"><div class="spinner"></div>Mengambil data dari Google Sheets&hellip;</div>
  <div id="content">
    <header>
      <div class="eyebrow">MKI &mdash; Cabang Makassar</div>

<script src="calc.js"></script>
<script>
const Rp=v=>v?'Rp'+Math.round(v).toLocaleString('id-ID'):'Rp0';
const Num=v=>(v||0).toLocaleString('id-ID');
const Pct=v=>(v||0).toFixed(1).replace('.',',')+'%';
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const params=new URLSearchParams(location.search);
const section=params.get('section')||'sales';
const PAGE_SIZE=15;
let page=1;
let searchQuery='';
let activeFilter='Semua';
let monthFilter='Semua'; // 'Semua' atau index bulan 0-11 — dipakai turnover/wilayah/delivery/ar

function agingDays(txt){ const m=String(txt||'').match(/\d+/g); return m ? parseInt(m[m.length-1],10) : 0; }

// ---- Agregasi bulanan generik dari transaksi 2026, dikelompokkan per key (mis. kode
// barang / nama wilayah / nama ekspedisi) — dipakai untuk tabel utama yang bisa
// difilter per bulan, sekaligus untuk drill-down tren 12 bulan. ----
function buildMonthlyAgg(items, keyFn){
  const map=new Map();
  items.forEach(t=>{
    const key=keyFn(t);
    if(key==null||key==='') return;
    if(!map.has(key)) map.set(key, Array.from({length:12},()=>({sales:0,qty:0,koli:0,invSet:new Set()})));
    const mi=t.orderDate.getMonth();
    if(mi<0||mi>11) return;
    const b=map.get(key)[mi];
    b.sales+=t.amount; b.qty+=t.qty; b.koli+=(t.koli||0); b.invSet.add(t.noInvoice);
  });
  return map;
}
function aggForMonth(monthlyArr, mf){
  if(mf==='Semua'||mf==null){
    return monthlyArr.reduce((acc,b)=>({sales:acc.sales+b.sales,qty:acc.qty+b.qty,koli:acc.koli+b.koli,invoiceUnik:acc.invoiceUnik+b.invSet.size}),{sales:0,qty:0,koli:0,invoiceUnik:0});
  }
  const b=monthlyArr[mf]||{sales:0,qty:0,koli:0,invSet:new Set()};
  return {sales:b.sales,qty:b.qty,koli:b.koli,invoiceUnik:b.invSet.size};
}

// Menyusun judul + KPI + tabel per section, dari objek metrics `m` yang SAMA
// PERSIS dipakai dashboard (computeAllMetrics) — supaya angka selalu konsisten.
function buildSpec(m){
  if(section==='sales'){
    const sc=m.salesByCompany;
    const mki=sc.companies.find(c=>c.company==='MKI');
    const cfn=sc.companies.find(c=>c.company==='CFN');
    const yoy=m.yoyComparison;
    const rows=yoy.months.map((mo,idx)=>[
      mo.label,
      Rp(mo.sales2025),
      Rp(mo.sales2026),
      Pct(growthPct(mo.sales2026,mo.sales2025)),
      Rp(mo.targetSalesRevenue),
      Pct(mo.targetSalesRevenue>0 ? (mo.sales2026/mo.targetSalesRevenue)*100 : 0),
      idx,
    ]);
    return {
      title:'Tren Penjualan (Sales) 2026',
      kpis:[
        {label:'Total Sales 2026',value:Rp(yoy.totalSales2026)},
        {label:'Target Tahunan',value:Rp(yoy.totalTarget)},
        {label:'Sales MKI',value:Rp(mki?mki.sales:0)},
        {label:'Sales CFN',value:Rp(cfn?cfn.sales:0)},
      ],
      tableTitle:'Penjualan per Bulan & Komparasi 2025 vs 2026',
      columns:['Bulan','Sales 2025','Sales 2026','Growth','Target','Capaian'],
      rows,
      isMonthTxDrill:true,
      hideSearch:true,
      rowClickHint:'Klik nama bulan untuk melihat semua transaksi bulan tersebut.',
    };
  }
  if(section==='revenue'){
    const rc=m.revenueByCompany;
    const mki=rc.companies.find(c=>c.company==='MKI');
    const cfn=rc.companies.find(c=>c.company==='CFN');
    const yoy=m.yoyComparison;
    const rows=yoy.months.map((mo,idx)=>[
      mo.label,
      Rp(mo.rev2025),
      Rp(mo.rev2026),
      Pct(growthPct(mo.rev2026,mo.rev2025)),
      Rp(mo.targetSalesRevenue),
      Pct(mo.targetSalesRevenue>0 ? (mo.rev2026/mo.targetSalesRevenue)*100 : 0),
      idx,
    ]);
    return {
      title:'Tren Pendapatan (Revenue) 2026',
      kpis:[
        {label:'Total Revenue 2026',value:Rp(yoy.totalRev2026)},
        {label:'Target Tahunan',value:Rp(yoy.totalTarget)},
        {label:'Revenue MKI',value:Rp(mki?mki.revenue:0)},
        {label:'Revenue CFN',value:Rp(cfn?cfn.revenue:0)},
      ],
      tableTitle:'Pendapatan per Bulan & Komparasi 2025 vs 2026',
      columns:['Bulan','Revenue 2025','Revenue 2026','Growth','Target','Capaian'],
      rows,
      isMonthRevDrill:true,
      hideSearch:true,
      rowClickHint:'Klik nama bulan untuk melihat semua pelunasan bulan tersebut.',
    };
  }
  if(section==='ratio'){
    const rr=m.salesToRevenueRatio;
    return {
      title:'Rasio Sales to Revenue 2026',
      kpis:[
        {label:'Total Sales',value:Rp(rr.totalSales)},
        {label:'Total Revenue',value:Rp(rr.totalRevenue)},
        {label:'Rasio Keseluruhan',value:Pct(rr.totalRatio)},
      ],
      tableTitle:'Rasio per Bulan 2026',
      columns:['Bulan','Sales','Revenue','Rasio'],
      rows:rr.monthly.map(mo=>[mo.label,Rp(mo.sales),Rp(mo.revenue),Pct(mo.ratio)]),
      hideSearch:true,
    };
  }
  if(section==='wilayah'){
    const z=m.zonaWilayah;
    const zc=z.zoneCounts||{};
    const monthlyMap=buildMonthlyAgg(tx2026Global, t=>t.lokasi);
    const computeRowsFor=(zoneKey)=>{
      let list=z.wilayahData;
      if(zoneKey!=='Semua') list=list.filter(w=>w.zone===zoneKey.toLowerCase());
      const withAgg=list.map(w=>{
        const monthly=monthlyMap.get(w.nama)||Array.from({length:12},()=>({sales:0,qty:0,koli:0,invSet:new Set()}));
        const agg=aggForMonth(monthly,'Semua');
        return {nama:w.nama,zone:w.zone,sales:agg.sales,invoiceUnik:agg.invoiceUnik};
      }).sort((a,b)=>b.sales-a.sales);
      return withAgg.map(x=>[x.nama,Num(x.invoiceUnik),Rp(x.sales),x.zone.charAt(0).toUpperCase()+x.zone.slice(1),x.nama]);
    };
    return {
      title:'Performa & Zona Wilayah Kabupaten/Kota',
      kpis:[
        {label:'Total Wilayah',value:Num(z.totalWilayah)},
        {label:'Wilayah Aktif',value:Num(z.wilayahAktif.length)},
        {label:'Zona Hijau',value:Num(zc.hijau||0)},
        {label:'Zona Merah',value:Num(zc.merah||0)},
      ],
      tableTitle:'Wilayah (By Invoice Unik & Sales)',
      columns:['Kabupaten/Kota','Invoice Unik','Sales','Zona'],
      filterLabel:'Zona',
      filterOptions:['Semua','Hijau','Kuning','Merah'],
      rowsByFilter:{
        Semua:computeRowsFor('Semua'),
        Hijau:computeRowsFor('Hijau'),
        Kuning:computeRowsFor('Kuning'),
        Merah:computeRowsFor('Merah'),
      },
      rows:computeRowsFor('Semua'),
      rowClickable:true,
      rowClickHint:'Klik nama wilayah untuk melihat invoice unik & sales per bulan.',
      getDrillData:(nama)=>{
        const monthly=monthlyMap.get(nama)||Array.from({length:12},()=>({sales:0,invSet:new Set()}));
        return {
          title:'Tren Bulanan \u2014 '+nama,
          columns:['Bulan','Invoice Unik','Sales'],
          rows:monthly.map((b,i)=>[MONTH_NAMES_ID[i],Num(b.invSet.size),Rp(b.sales)]),
        };
      },
    };
  }
  if(section==='turnover'){
    const tp=m.topProducts;
    const monthlyMapAll=buildMonthlyAgg(tx2026Global, t=>t.kodeBarang);
    const monthlyMapMKI=buildMonthlyAgg(tx2026Global.filter(t=>t.company==='MKI'), t=>t.kodeBarang);
    const monthlyMapCFN=buildMonthlyAgg(tx2026Global.filter(t=>t.company==='CFN'), t=>t.kodeBarang);
    const computeRowsFor=(mf)=>{
      const list=[];
      monthlyMapAll.forEach((monthly,kode)=>{
        const agg=aggForMonth(monthly,mf);
        list.push({kode,sales:agg.sales,qty:agg.qty});
      });
      list.sort((a,b)=>b.sales-a.sales);
      return list.map(x=>[x.kode,Rp(x.sales),Num(x.qty),x.kode]);
    };
    return {
      title:'Turnover Gudang \u2014 Kode Barang Terlaris',
      kpis:[
        {label:'Total Kode Barang',value:Num(tp.totalProductCount)},
        {label:'Terlaris (Sales)',value:tp.topBySales[0]?tp.topBySales[0].kode:'-'},
      ],
      tableTitle:'Kode Barang Terlaris (By Sales)',
      columns:['Kode Barang','Sales','Quantity'],
      monthFilterEnabled:true,
      computeVariants:(mf)=>({Semua:computeRowsFor(mf)}),
      rowClickable:true,
      rowClickHint:'Klik kode barang untuk melihat quantity, company & sales per bulan.',
      getDrillData:(kode)=>{
        const monthlyMKI=monthlyMapMKI.get(kode)||Array.from({length:12},()=>({sales:0,qty:0}));
        const monthlyCFN=monthlyMapCFN.get(kode)||Array.from({length:12},()=>({sales:0,qty:0}));
        const rows=[];
        for(let i=0;i<12;i++){
          rows.push([MONTH_NAMES_ID[i],'MKI',Num(monthlyMKI[i].qty),Rp(monthlyMKI[i].sales)]);
          rows.push([MONTH_NAMES_ID[i],'CFN',Num(monthlyCFN[i].qty),Rp(monthlyCFN[i].sales)]);
        }
        return {
          title:'Tren Bulanan by Company \u2014 '+kode,
          columns:['Bulan','Company','Quantity','Sales'],
          rows,
        };
      },
    };
  }
  if(section==='delivery'){
    const d=m.delivery;
    const monthlyMapAll=buildMonthlyAgg(tx2026Global, t=>t.statusEkspedisi||'TIDAK TERCATAT');
    const computeRowsFor=(mf)=>{
      const list=[];
      monthlyMapAll.forEach((monthly,nama)=>{
        const agg=aggForMonth(monthly,mf);
        list.push({nama,invoiceUnik:agg.invoiceUnik,qty:agg.qty,koli:agg.koli,sales:agg.sales});
      });
      list.sort((a,b)=>b.sales-a.sales);
      return list.map(x=>[x.nama,Num(x.invoiceUnik),Num(x.qty),Num(x.koli),Rp(x.sales),x.nama]);
    };
    return {
      title:'Delivery & Ekspedisi 2026',
      kpis:[
        {label:'Total Transaksi',value:Num(d.total)},
        {label:'Hand Carry',value:Pct(d.handCarry.pct)},
        {label:'Ekspedisi Luar',value:Pct(d.ekspedisiLuar.pct)},
        {label:'Total Koli',value:Num(d.totalKoli)},
      ],
      tableTitle:'Jalur Ekspedisi (Invoice Unik, Qty, Koli & Sales)',
      columns:['Jalur Ekspedisi','Invoice Unik','Quantity','Koli','Sales'],
      monthFilterEnabled:true,
      computeVariants:(mf)=>({Semua:computeRowsFor(mf)}),
      rowClickable:true,
      rowClickHint:'Klik nama jalur ekspedisi untuk melihat invoice unik, qty, koli & sales per bulan.',
      getDrillData:(nama)=>{
        const monthly=monthlyMapAll.get(nama)||Array.from({length:12},()=>({sales:0,qty:0,koli:0,invSet:new Set()}));
        return {
          title:'Tren Bulanan \u2014 '+nama,
          columns:['Bulan','Invoice Unik','Quantity','Koli','Sales'],
          rows:monthly.map((b,i)=>[MONTH_NAMES_ID[i],Num(b.invSet.size),Num(b.qty),Num(b.koli),Rp(b.sales)]),
        };
      },
    };
  }
  if(section==='ar'){
    const ar=m.ar;
    const belumLunas=ar.items.filter(i=>i.sisaSaldo>0);
    const AGING_BUCKETS=[
      {key:'Semua', test:()=>true},
      {key:'0-13 Hari', test:d=>d>=0&&d<=13},
      {key:'14-30 Hari', test:d=>d>=14&&d<=30},
      {key:'>30 Hari', test:d=>d>30&&d<=60},
      {key:'>60 Hari', test:d=>d>60},
    ];
    const byCustomer=new Map();
    belumLunas.forEach(i=>{
      if(!byCustomer.has(i.customer)) byCustomer.set(i.customer,[]);
      byCustomer.get(i.customer).push(i);
    });
    function computeRowsFor(bucketKey){
      const bucket=AGING_BUCKETS.find(b=>b.key===bucketKey)||AGING_BUCKETS[0];
      let list=belumLunas.filter(i=>bucket.test(agingDays(i.aging)));
      list=list.slice().sort((a,b)=>agingDays(b.aging)-agingDays(a.aging));
      return list.map(i=>[i.noFaktur,i.customer,Rp(i.sisaSaldo),i.aging,i.customer]);
    }
    const rowsByFilterAR={};
    AGING_BUCKETS.forEach(b=>{ rowsByFilterAR[b.key]=computeRowsFor(b.key); });
    return {
      title:'Piutang (AR) 2026',
      kpis:[
        {label:'Total Sisa Saldo',value:Rp(ar.totalSisaSaldo)},
        {label:'Piutang >60 Hari',value:Rp(ar.totalPiutangDiatas60Hari)},
        {label:'Rasio AR / Sales',value:Pct(ar.ratioARtoSales)},
      ],
      tableTitle:'Piutang Belum Lunas (Aging Tertinggi)',
      columns:['No Faktur','Customer','Sisa Saldo','Aging'],
      filterLabel:'Aging',
      filterOptions:AGING_BUCKETS.map(b=>b.key),
      rowsByFilter:rowsByFilterAR,
      rows:rowsByFilterAR.Semua,
      rowClickable:true,
      rowClickHint:'Klik baris untuk melihat riwayat piutang customer tersebut per bulan.',
      getDrillData:(customerName)=>{
        const items=(byCustomer.get(customerName)||[]).slice().sort((a,b)=>(a.tanggal&&b.tanggal?a.tanggal-b.tanggal:0));
        const total=items.reduce((s,i)=>s+i.sisaSaldo,0);
        return {
          title:'Riwayat Piutang \u2014 '+customerName,
          sub:'Total Sisa Saldo Piutang Customer Ini: '+Rp(total),
          columns:['Bulan','No Invoice','Sisa Saldo'],
          rows:items.map(i=>[i.tanggal?MONTH_NAMES_ID[i.tanggal.getMonth()]:'-',i.noFaktur,Rp(i.sisaSaldo)]),
        };
      },
    };
  }
  if(section==='customer'){
    const cf=m.customerFrequency;
    const FREQ_BUCKETS=[
      {key:'Semua', test:()=>true},
      {key:'1x Belanja', test:n=>n===1},
      {key:'2x Belanja', test:n=>n===2},
      {key:'3-5x Belanja', test:n=>n>=3&&n<=5},
      {key:'5-10x Belanja', test:n=>n>5&&n<=10},
      {key:'>10x Belanja', test:n=>n>10},
    ];
    const mapRows=list=>list.map(c=>[c.customer,Num(c.invoiceUnik),Rp(c.totalSales)]);
    const variants={};
    FREQ_BUCKETS.forEach(b=>{ variants[b.key]=mapRows(cf.allBySales.filter(c=>b.test(c.invoiceUnik))); });
    return {
      title:'Frekuensi Pembelanjaan Customer 2026',
      kpis:[
        {label:'Total Customer Unik',value:Num(cf.totalCustomer)},
        {label:'Rata-rata Frekuensi',value:cf.avgFrequency.toFixed(1)+'x'},
        {label:'Customer Tidak Aktif',value:Num(cf.churnedCustomers.length)},
      ],
      tableTitle:'Customer (By Total Sales)',
      columns:['Customer','Frekuensi','Total Sales'],
      filterLabel:'Frekuensi Belanja',
      filterOptions:FREQ_BUCKETS.map(b=>b.key),
      rowsByFilter:variants,
      rows:variants.Semua,
    };
  }
  // fiber
  const fo=m.fiberOptic1Core;
  const mapKodeRow=k=>[k.kode,Rp(k.sales),Num(k.qty),k.kode];
  return {
    title:'Fiber Optic 1-Core 2026',
    kpis:[
      {label:'Total Sales',value:Rp(fo.totalSales)},
      {label:'Total Qty',value:Num(fo.totalQty)},
    ],
    tableTitle:'Kode Barang Fiber Optic 1-Core',
    columns:['Kode Barang','Sales','Quantity'],
    hideSearch:true,
    rows:fo.byKode.map(mapKodeRow),
    rowClickable:true,
    rowClickHint:'Klik kode barang untuk melihat quantity & sales per bulan.',
    getDrillData:(kode)=>{
      const k=fo.byKode.find(x=>x.kode===kode);
      if(!k) return {title:kode,columns:['Bulan','Quantity','Sales'],rows:[]};
      return {
        title:'Tren Bulanan \u2014 '+kode,
        columns:['Bulan','Quantity','Sales'],
        rows:k.monthly.map(mo=>[mo.label,Num(mo.qty),Rp(mo.sales)]),
      };
    },
  };
}

function getBaseRows(spec){
  const variants=spec.computeVariants ? spec.computeVariants(monthFilter) : (spec.rowsByFilter || {Semua:spec.rows});
  return variants[activeFilter] || variants.Semua || spec.rows;
}
function getFilteredRows(spec){
  const base=getBaseRows(spec);
  const q=searchQuery.trim().toUpperCase();
  if(!q) return base;
  return base.filter(row=>row.some(cell=>String(cell).toUpperCase().includes(q)));
}

function renderPagination(spec,filtered){
  const total=filtered.length;
  const totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(page>totalPages) page=totalPages;
  const el=document.getElementById('pagination');
  if(totalPages<=1){ el.innerHTML=''; return; }
  const pages=[];
  const windowSize=7;
  if(totalPages<=windowSize){ for(let i=1;i<=totalPages;i++) pages.push(i); }
  else{
    pages.push(1);
    let start=Math.max(2,page-2), end=Math.min(totalPages-1,page+2);
    if(start>2) pages.push('...');
    for(let i=start;i<=end;i++) pages.push(i);
    if(end<totalPages-1) pages.push('...');
    pages.push(totalPages);
  }
  el.innerHTML=`
    <button class="page-btn" data-page="${page-1}" ${page===1?'disabled':''}>&larr;</button>
    ${pages.map(p=>p==='...' ? '<span class="page-ellipsis">&hellip;</span>' : `<button class="page-btn ${p===page?'active':''}" data-page="${p}">${p}</button>`).join('')}
    <button class="page-btn" data-page="${page+1}" ${page===totalPages?'disabled':''}>&rarr;</button>
  `;
  el.querySelectorAll('.page-btn[data-page]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const p=parseInt(btn.dataset.page,10);
      if(p>=1&&p<=totalPages){ page=p; render(spec); window.scrollTo({top:0,behavior:'smooth'}); }
    });
  });
}

let currentSpec=null;
function render(spec){
  currentSpec=spec;
  document.getElementById('pageTitleTag').textContent=spec.title+' \u2014 MKI Cabang Makassar';
  document.getElementById('pageTitle').textContent=spec.title;
  document.getElementById('pageMeta').textContent=new Date().toLocaleString('id-ID',{dateStyle:'full',timeStyle:'short'});

  const kpis=spec.kpis.concat(spec.extraKpiForMonth ? [spec.extraKpiForMonth(monthFilter)] : []);
  document.getElementById('summaryBar').innerHTML=kpis.map(k=>`<div class="summary-card"><div class="label">${esc(k.label)}</div><div class="value">${esc(k.value)}</div></div>`).join('');
  fitCardValues();

  document.getElementById('tableTitle').textContent=spec.tableTitle;
  document.getElementById('liveSearch').closest('.search-box').classList.toggle('hidden', !!spec.hideSearch);

  const filtered=getFilteredRows(spec);
  const baseCount=getBaseRows(spec).length;
  let subText=Num(filtered.length)+' baris data'+(searchQuery.trim()?' (dari total '+Num(baseCount)+')':'');
  if(spec.rowClickHint) subText+=' \u2014 '+spec.rowClickHint;
  document.getElementById('tableSub').textContent=subText;
  document.querySelector('#dataTable thead').innerHTML='<tr>'+spec.columns.map(c=>'<th>'+esc(c)+'</th>').join('')+'</tr>';

  const totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  if(page>totalPages) page=totalPages;
  const shown=filtered.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);
  const nCols=spec.columns.length;
  const clickable=spec.isMonthTxDrill||spec.isMonthRevDrill||spec.rowClickable;
  document.querySelector('#dataTable tbody').innerHTML=shown.length
    ? shown.map(row=>{
        const cells=row.slice(0,nCols).map(cell=>'<td>'+esc(cell)+'</td>').join('');
        const cls=clickable?' class="data-table-row-clickable"':'';
        const meta=clickable?` data-meta="${esc(row[nCols])}"`:'';
        return `<tr${cls}${meta}>${cells}</tr>`;
      }).join('')
    : `<tr><td colspan="${nCols}" class="empty">${searchQuery.trim() ? 'Tidak ada data yang cocok.' : 'Belum ada data.'}</td></tr>`;
  renderPagination(spec,filtered);

  if(clickable){
    document.querySelectorAll('#dataTable tbody tr[data-meta]').forEach(tr=>{
      tr.addEventListener('click',()=>{
        if(spec.isMonthTxDrill) showMonthDrilldown(parseInt(tr.dataset.meta,10));
        else if(spec.isMonthRevDrill) showMonthDrilldownRev(parseInt(tr.dataset.meta,10));
        else showGenericDrilldown(spec,tr.dataset.meta);
      });
    });
  }

  // Kalau hasil pencarian tinggal cocok 1 baris, langsung tampilkan drill-down-nya
  // (tanpa perlu klik lagi) — memudahkan saat user langsung ketik nama spesifik.
  if(!spec.isMonthTxDrill && !spec.isMonthRevDrill && spec.getDrillData && searchQuery.trim() && filtered.length===1){
    showGenericDrilldown(spec, filtered[0][nCols]);
  }
}

// Beberapa angka Rupiah besar bisa melebihi lebar cardbox — kecilkan font
// bertahap sampai muat dalam satu baris, supaya tidak terpotong ke baris kedua.
function fitCardValues(){
  document.querySelectorAll('.summary-card .value').forEach(el=>{
    let size=18;
    el.style.fontSize=size+'px';
    while(el.scrollWidth>el.clientWidth && size>11){
      size-=1;
      el.style.fontSize=size+'px';
    }
  });
}

    <button class="page-btn" data-page="${drillPage-1}" ${drillPage===1?'disabled':''}>&larr;</button>

    <button class="page-btn" data-page="${drillPage+1}" ${drillPage===totalPages?'disabled':''}>&rarr;</button>
  `;
  el.querySelectorAll('.page-btn[data-page]').forEach(btn=>{

// ---- Drill-down generik: dipakai turnover/wilayah/delivery/ar/fiber — tabel
// tetap (mis. 12 baris per bulan), tanpa search/pagination. ----
function showGenericDrilldown(spec,metaKey){
  const data=spec.getDrillData(metaKey);
  document.getElementById('drillTitle').textContent=data.title;
  document.getElementById('drillSub').textContent=data.sub||'';
  document.getElementById('drillSearch').closest('.search-box').classList.add('hidden');
  document.getElementById('drillPagination').innerHTML='';
  document.querySelector('#drillTable thead').innerHTML='<tr>'+data.columns.map(c=>'<th>'+esc(c)+'</th>').join('')+'</tr>';
  document.querySelector('#drillTable tbody').innerHTML=data.rows.length
    ? data.rows.map(row=>'<tr>'+row.map(cell=>'<td>'+esc(cell)+'</td>').join('')+'</tr>').join('')
    : `<tr><td colspan="${data.columns.length}" class="empty">Belum ada data.</td></tr>`;
  document.getElementById('drillPanel').style.display='block';
  document.getElementById('drillPanel').scrollIntoView({behavior:'smooth',block:'start'});
}

async function main(){
  try{
    const {data,errors}=await loadAllSheetData();
    const m=computeAllMetrics(data);
    tx2026Global=filterYear(m.transactions,CURRENT_YEAR);
    rev2026Global=m.revAllNormalized.filter(r=>r.paymentDate.getFullYear()===CURRENT_YEAR);
    const spec=buildSpec(m);
    document.getElementById('status').style.display='none';
    document.getElementById('content').style.display='block';

    if(spec.filterOptions && spec.filterOptions.length>1){
      document.getElementById('filterRow').style.display='flex';
      document.getElementById('filterLabelText').textContent=spec.filterLabel||'Filter';
      const sel=document.getElementById('filterSelect');
      sel.innerHTML=spec.filterOptions.map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join('');
      sel.addEventListener('change',(e)=>{
        activeFilter=e.target.value;
        page=1;
        render(spec);
      });
    }

    if(spec.monthFilterEnabled){
      document.getElementById('monthFilterRow').style.display='flex';
      const msel=document.getElementById('monthFilterSelect');
      msel.innerHTML='<option value="Semua">Semua Bulan</option>'+MONTH_NAMES_ID.map((mo,i)=>`<option value="${i}">${mo}</option>`).join('');
      msel.addEventListener('change',(e)=>{
        monthFilter=e.target.value==='Semua' ? 'Semua' : parseInt(e.target.value,10);
        page=1;
        render(spec);
      });
    }

    render(spec);
    document.getElementById('liveSearch').addEventListener('input',(e)=>{
      searchQuery=e.target.value;
      page=1;
      render(spec);
    });
    document.getElementById('drillSearch').addEventListener('input',(e)=>{
      drillSearch=e.target.value;
      drillPage=1;
      if(section==='revenue') renderDrilldownRev(); else renderDrilldown();
    });
  }catch(err){
    document.getElementById('status').innerHTML='<div style="color:#b84040;">Gagal memuat data: '+esc(err.message)+'</div>';
    console.error(err);
  }
}
main();
